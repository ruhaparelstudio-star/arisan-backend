version: '3.8'
services:
  api:
    build:
      context: ../arisan-api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ../arisan-api/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - API_URL=http://api:3001
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
